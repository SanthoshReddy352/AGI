# Web search backend configuration
# FRIDAY tries backends in order until one succeeds.

# Primary backend: duckduckgo (no API key, requires `pip install duckduckgo-search`)
# Fallback: ddg_html (stdlib-only, scrapes DuckDuckGo HTML)
primary_backend: duckduckgo

# Optional API-key backends (uncomment and set keys to enable):
# brave:
#   api_key: ""              # https://api.search.brave.com/
# tavily:
#   api_key: ""              # https://tavily.com/
# searxng:
#   base_url: "http://localhost:8888"   # self-hosted SearXNG instance

# Fetch settings
fetch_timeout_sec: 10
max_extract_chars: 4000
