# MCP server configuration — empty by default.
# Add servers here and restart FRIDAY to register their tools.
#
# Format:
# servers:
#   - name: github          # friendly name (becomes the tool name prefix)
#     command: ["gh", "mcp-server"]    # local command to start the server
#     # OR:
#     url: "http://localhost:3000"      # HTTP/SSE server URL
#     description: "GitHub CLI MCP server"
#     enabled: true
#
# Example (GitHub MCP server via gh CLI):
# servers:
#   - name: github
#     command: ["gh", "extension", "exec", "mcp-server"]
#     description: "GitHub tools: list issues, create PR, search repos"
#     enabled: true

servers: []
