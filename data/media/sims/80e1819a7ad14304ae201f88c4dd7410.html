<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Derivative Explorer — Multiple Functions</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #0d1117; color: #e6edf3; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.container { max-width: 1000px; width: 100%; padding: 20px; }
h1 { font-size: 1.2rem; margin-bottom: 6px; color: #f0f6fc; }
.sub { font-size: 0.85rem; color: #8b949e; margin-bottom: 16px; }
.controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; align-items: center; }
.controls button { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 7px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: all 0.15s; }
.controls button:hover { background: #30363d; }
.controls button.active { background: #1f6feb; border-color: #388bfd; color: #fff; }
.controls label { font-size: 0.85rem; color: #8b949e; margin-left: 12px; }
.controls input[type="range"] { width: 120px; accent-color: #58a6ff; }
.canvas-wrap { position: relative; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
canvas { display: block; width: 100%; height: auto; cursor: crosshair; }
.info-bar { display: flex; gap: 20px; padding: 10px 14px; font-family: monospace; font-size: 0.85rem; background: #161b22; border-top: 1px solid #30363d; flex-wrap: wrap; }
.info-item { display: flex; align-items: center; gap: 6px; }
.info-item .label { color: #8b949e; }
.info-item .val { color: #f0f6fc; font-weight: 600; }
.info-item .val.pos { color: #3fb950; }
.info-item .val.neg { color: #f85149; }
.info-item .val.zero { color: #d29922; }
.legend { display: flex; gap: 16px; padding: 8px 14px; font-size: 0.78rem; background: #0d1117; border-top: 1px solid #30363d; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-item .swatch { width: 20px; height: 3px; border-radius: 2px; }
.legend-item .swatch.dashed { background: repeating-linear-gradient(90deg, #58a6ff 0, #58a6ff 6px, transparent 6px, transparent 10px); }
.auto-btn { margin-left: auto; }
@media (max-width: 600px) {
  .controls { gap: 6px; }
  .controls button { padding: 5px 10px; font-size: 0.8rem; }
  .info-bar { gap: 10px; font-size: 0.75rem; }
}
</style>
</head>
<body>
<div class="container">
  <h1>Derivative Explorer</h1>
  <div class="sub">Drag across the curve → watch the tangent line and f'(x) change</div>

  <div class="controls">
    <button class="active" data-fn="sin">sin(x)</button>
    <button data-fn="exp">eˣ</button>
    <button data-fn="x3">x³</button>
    <button data-fn="ln">ln(x)</button>
    <button data-fn="x2_plus">x² + 1</button>
    <label>
      <input type="range" id="xSlider" min="0" max="1000" value="500"> <span id="xVal">0.0</span>
    </label>
    <button id="autoBtn" class="auto-btn">▶ Auto</button>
  </div>

  <div class="canvas-wrap">
    <canvas id="c" width="960" height="540"></canvas>
  </div>

  <div class="info-bar">
    <div class="info-item"><span class="label">x =</span><span class="val" id="dispX">0.00</span></div>
    <div class="info-item"><span class="label">f(x) =</span><span class="val" id="dispF">0.00</span></div>
    <div class="info-item"><span class="label">f'(x) =</span><span class="val" id="dispD">1.00</span></div>
    <div class="info-item"><span class="label">tangent slope =</span><span class="val" id="dispSlope">1.00</span></div>
  </div>

  <div class="legend">
    <div class="legend-item"><span class="swatch" style="background:#58a6ff;"></span> f(x) curve</div>
    <div class="legend-item"><span class="swatch dashed"></span> tangent line</div>
    <div class="legend-item"><span class="swatch" style="background:#f0883e;"></span> rise/run triangle</div>
    <div class="legend-item"><span class="swatch" style="background:#7ee787;"></span> derivative f'(x) curve</div>
    <div class="legend-item"><span class="swatch" style="background:transparent;border:1px dashed #8b949e;height:0;"></span> zero line</div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ---------- coordinate system ----------
const xMin = -4.5, xMax = 4.5, yMin = -3.5, yMax = 3.5;
function toScreen(x, y) {
  return [(x - xMin) / (xMax - xMin) * W, H - (y - yMin) / (yMax - yMin) * H];
}
function toWorld(sx, sy) {
  return [sx / W * (xMax - xMin) + xMin, (H - sy) / H * (yMax - yMin) + yMin];
}

// ---------- functions ----------
const FUNCS = {
  sin: {
    label: 'sin(x)',
    f: x => Math.sin(x),
    df: x => Math.cos(x),
    color: '#58a6ff'
  },
  exp: {
    label: 'eˣ',
    f: x => Math.exp(x),
    df: x => Math.exp(x),
    color: '#58a6ff'
  },
  x3: {
    label: 'x³',
    f: x => x * x * x,
    df: x => 3 * x * x,
    color: '#58a6ff'
  },
  ln: {
    label: 'ln(x)',
    f: x => x > 0 ? Math.log(x) : NaN,
    df: x => x > 0 ? 1 / x : NaN,
    color: '#58a6ff'
  },
  x2_plus: {
    label: 'x²+1',
    f: x => x * x + 1,
    df: x => 2 * x,
    color: '#58a6ff'
  }
};

let currentFn = 'sin';
let mouseX = 0; // screen x
let mouseOnCanvas = false;
let autoAnim = false;
let autoPhase = 0;

// UI refs
const dispX = document.getElementById('dispX');
const dispF = document.getElementById('dispF');
const dispD = document.getElementById('dispD');
const dispSlope = document.getElementById('dispSlope');
const xSlider = document.getElementById('xSlider');
const xVal = document.getElementById('xVal');
const autoBtn = document.getElementById('autoBtn');

// -------- drawing --------
function draw() {
  ctx.clearRect(0, 0, W, H);

  const fn = FUNCS[currentFn];
  const px = mouseOnCanvas ? mouseX : W / 2;
  const [wx] = toWorld(px, 0);
  const clampedWx = Math.max(xMin + 0.05, Math.min(xMax - 0.05, wx));
  const fwx = fn.f(clampedWx);
  const dfwx = fn.df(clampedWx);
  const valid = isFinite(fwx) && isFinite(dfwx);

  // --- grid ---
  ctx.strokeStyle = '#21262d';
  ctx.lineWidth = 1;
  // vertical grid
  for (let x = Math.ceil(xMin); x <= Math.floor(xMax); x++) {
    const [sx] = toScreen(x, 0);
    ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, H); ctx.stroke();
  }
  // horizontal grid
  for (let y = Math.ceil(yMin); y <= Math.floor(yMax); y++) {
    const [, sy] = toScreen(0, y);
    ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(W, sy); ctx.stroke();
  }

  // --- zero line ---
  ctx.strokeStyle = '#8b949e';
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 6]);
  const [, zy] = toScreen(0, 0);
  if (zy >= 0 && zy <= H) {
    ctx.beginPath(); ctx.moveTo(0, zy); ctx.lineTo(W, zy); ctx.stroke();
  }
  ctx.setLineDash([]);

  // --- f(x) curve ---
  ctx.strokeStyle = fn.color;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  let first = true;
  for (let sx = 0; sx <= W; sx += 1) {
    const [x] = toWorld(sx, 0);
    const y = fn.f(x);
    if (!isFinite(y)) { first = true; continue; }
    const [, sy] = toScreen(x, y);
    if (sy < -200 || sy > H + 200) { first = true; continue; }
    if (first) { ctx.moveTo(sx, sy); first = false; }
    else ctx.lineTo(sx, sy);
  }
  ctx.stroke();

  // --- derivative f'(x) curve ---
  ctx.strokeStyle = '#7ee787';
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.7;
  ctx.beginPath();
  first = true;
  for (let sx = 0; sx <= W; sx += 1) {
    const [x] = toWorld(sx, 0);
    const d = fn.df(x);
    if (!isFinite(d)) { first = true; continue; }
    const [, sy] = toScreen(x, d);
    if (sy < -200 || sy > H + 200) { first = true; continue; }
    if (first) { ctx.moveTo(sx, sy); first = false; }
    else ctx.lineTo(sx, sy);
  }
  ctx.stroke();
  ctx.globalAlpha = 1;

  // --- label the derivative curve ---
  ctx.font = '13px monospace';
  ctx.fillStyle = '#7ee787';
  const [dlx, dly] = toScreen(xMax - 0.7, fn.df(xMax - 0.7));
  ctx.fillText("f'(x)", dlx - 20, Math.min(H - 8, Math.max(16, dly - 6)));

  // --- label the function ---
  ctx.fillStyle = fn.color;
  const [flx, fly] = toScreen(2.5, fn.f(2.5));
  ctx.fillText("f(x)", flx - 10, Math.min(H - 8, Math.max(16, fly - 6)));

  if (!valid) {
    ctx.fillStyle = '#f85149';
    ctx.font = '14px system-ui';
    ctx.fillText('undefined at this x', 20, 30);
    // still draw UI
    updateInfo(clampedWx, fwx, dfwx, valid);
    return;
  }

  // --- tangent line ---
  ctx.strokeStyle = '#58a6ff';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([8, 6]);
  const tanSlope = dfwx;
  // extend line ±2 x-units from point
  const dxTan = 2;
  const x1t = clampedWx - dxTan;
  const y1t = fwx - tanSlope * dxTan;
  const x2t = clampedWx + dxTan;
  const y2t = fwx + tanSlope * dxTan;
  const [sx1t, sy1t] = toScreen(x1t, y1t);
  const [sx2t, sy2t] = toScreen(x2t, y2t);
  // clip to screen
  ctx.beginPath(); ctx.moveTo(sx1t, sy1t); ctx.lineTo(sx2t, sy2t); ctx.stroke();
  ctx.setLineDash([]);

  // --- tangent point (dot) ---
  const [ptSx, ptSy] = toScreen(clampedWx, fwx);
  ctx.fillStyle = '#f0f6fc';
  ctx.beginPath(); ctx.arc(ptSx, ptSy, 4, 0, 2 * Math.PI); ctx.fill();
  ctx.strokeStyle = '#58a6ff';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // --- rise/run triangle ---
  const run = 0.5; // x-distance for triangle
  const rise = tanSlope * run;
  const [rAx, rAy] = toScreen(clampedWx, fwx);
  const [rBx, rBy] = toScreen(clampedWx + run, fwx);
  const [rCx, rCy] = toScreen(clampedWx + run, fwx + rise);

  // only draw if triangle is visible
  const triVisible = rAy > 0 && rAy < H && rBy > 0 && rBy < H && rCy > 0 && rCy < H;

  if (triVisible) {
    ctx.strokeStyle = '#f0883e';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(rAx, rAy);
    ctx.lineTo(rBx, rBy);
    ctx.lineTo(rCx, rCy);
    ctx.stroke();

    // fill triangle
    ctx.fillStyle = 'rgba(240, 136, 62, 0.12)';
    ctx.beginPath();
    ctx.moveTo(rAx, rAy);
    ctx.lineTo(rBx, rBy);
    ctx.lineTo(rCx, rCy);
    ctx.closePath();
    ctx.fill();

    // labels: "run" and "rise"
    ctx.font = '11px monospace';
    ctx.fillStyle = '#f0883e';
    const midRunX = (rAx + rBx) / 2;
    const midRunY = (rAy + rBy) / 2;
    ctx.fillText('run', midRunX - 12, midRunY - 4);
    const midRiseX = (rBx + rCx) / 2 + 8;
    const midRiseY = (rBy + rCy) / 2;
    ctx.fillText('rise', midRiseX - 4, midRiseY + 4);
  }

  // --- vertical dashed line at x ---
  ctx.strokeStyle = 'rgba(139, 148, 158, 0.3)';
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 5]);
  ctx.beginPath(); ctx.moveTo(ptSx, 0); ctx.lineTo(ptSx, H); ctx.stroke();
  ctx.setLineDash([]);

  updateInfo(clampedWx, fwx, dfwx, valid);
}

function updateInfo(x, fx, df, valid) {
  dispX.textContent = x.toFixed(3);
  if (valid && isFinite(fx)) {
    dispF.textContent = fx.toFixed(4);
    dispF.className = 'val';
  } else {
    dispF.textContent = '—';
    dispF.className = 'val';
  }
  if (valid && isFinite(df)) {
    dispD.textContent = df.toFixed(4);
    dispD.className = 'val ' + (df > 0.01 ? 'pos' : df < -0.01 ? 'neg' : 'zero');
    dispSlope.textContent = df.toFixed(4);
    dispSlope.className = 'val ' + (df > 0.01 ? 'pos' : df < -0.01 ? 'neg' : 'zero');
  } else {
    dispD.textContent = '—';
    dispD.className = 'val';
    dispSlope.textContent = '—';
    dispSlope.className = 'val';
  }
  xVal.textContent = x.toFixed(2);
}

// ---------- mouse ----------
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  mouseX = (e.clientX - rect.left) * scaleX;
  mouseX = Math.max(0, Math.min(W, mouseX));
  mouseOnCanvas = true;
  if (!autoAnim) {
    const [, wx] = toWorld(mouseX, 0);
    xSlider.value = (mouseX / W * 1000);
    draw();
  }
});

canvas.addEventListener('mouseleave', () => {
  mouseOnCanvas = false;
  if (!autoAnim) draw();
});

// ---------- slider ----------
xSlider.addEventListener('input', () => {
  if (autoAnim) { autoAnim = false; autoBtn.textContent = '▶ Auto'; }
  mouseX = xSlider.value / 1000 * W;
  mouseOnCanvas = true;
  draw();
});

// ---------- function buttons ----------
document.querySelectorAll('[data-fn]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-fn]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFn = btn.dataset.fn;
    draw();
  });
});

// ---------- auto animation ----------
autoBtn.addEventListener('click', () => {
  autoAnim = !autoAnim;
  autoBtn.textContent = autoAnim ? '⏸ Pause' : '▶ Auto';
  if (autoAnim) autoPhase = 0;
  else draw();
});

function animate() {
  if (autoAnim) {
    autoPhase += 0.006;
    const t = (Math.sin(autoPhase) + 1) / 2; // 0..1
    mouseX = t * W;
    xSlider.value = t * 1000;
    mouseOnCanvas = true;
    draw();
  }
  requestAnimationFrame(animate);
}
animate();

// init
draw();
</script>
</body>
</html>
