# ── research ─────────────────────────────────────────────────────────────
  - name: research_topic
    category: research
    summary: Multi-source research briefing on a topic. Mode auto-detected from phrasing — quick (~15-20s) for "tldr/briefly/quick research on X"; deep (~60-120s) for "research/deep dive/thorough on X". Domain-aware (arxiv/pubmed/hn/yfinance picked from topic).
    example_phrases:
      # deep mode — default for "research X" / "deep dive" / "thorough" / "literature review"
      - research the history of GPT
      - deep dive on rotary position embedding
      - thorough briefing on transformer scaling laws
      - literature review on CRISPR Cas9
      - in-depth research on long covid treatment
      - write a detailed report on quantum dot displays
      - dig into this topic in depth
      - do some research on this for me
      - investigate the linux kernel
      # quick mode — for "tldr" / "briefly" / "one-pager" / "quick research"
      - tldr history of GPT
      - briefly on rotary position embedding
      - quick research on attention heads
      - give me a one-pager on RAG
      - quick brief on diffusion models
      - summarize transformer scaling laws
      # comparative — always routes deep
      - compare RAG vs fine-tuning
      - X vs Y comparison
      - which is better, RAG or fine-tuning
    parameters:
      topic: "string — research topic"
      mode: "string — 'quick' or 'deep' (auto-detected from phrasing if absent)"

