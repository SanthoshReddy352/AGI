# FRIDAY tool catalog
#
# Single source of truth for user-facing capabilities. Read at boot by
# `core.tool_catalog.Catalog`, then:
#   • `EmbeddingRouter` embeds every `example_phrases` entry (so cosine
#     similarity matches *how users actually talk*, not the noun cloud
#     auto-built from descriptions).
#   • The Qwen-4B planner prompt is injected with the top-K closest
#     `example_phrases` as few-shot context — small models benefit
#     enormously from worked examples.
#   • `modules.llm_chat.plugin` does a pre-flight reroute: if the user's
#     query has cosine ≥ 0.62 against any phrase here, the chat plugin
#     aborts generation and dispatches the matching tool.
#
# Schema:
#   version: int
#   tools:
#     - name: <capability_name as registered>      # required
#       category: <free-form>                     # required, for grouping
#       summary: <one-line, used in planner prompt>   # required
#       example_phrases:                          # required, 5–15 entries
#         - "<utterance the user might say>"
#       parameters: { <arg>: "<one-line description>" }   # optional
#       embeddable: true                          # default true
#       blocked_from_chat_preflight: false        # default false — see below
#
# `blocked_from_chat_preflight: true` means we won't auto-dispatch from
# the chat plugin's preflight even if cosine is high — for tools that
# require structured args (e.g. set_volume needs a percent) the dispatch
# with empty args would be a bad UX. The planner can still handle them.

version: 1

tools:

# ── memory & profile ───────────────────────────────────────────────────────
  - name: show_memories
    category: memory
    summary: Tell the user what FRIDAY knows about them (name, role, location, preferences).
    example_phrases:
      - what do you know about me
      - what do you remember about me
      - what have you learned about me
      - show me my memories
      - list my memories
      - tell me about myself
      - what are my preferences
      - do you remember anything about me
      - tell me everything you know about me

  - name: record_personal_fact
    category: memory
    summary: Save a single personal fact (name, location, role, etc.) to the profile.
    example_phrases:
      - my name is Alex
      - I'm a data scientist
      - call me Sam
      - I am in Nellore
      - my role is researcher
      - my hometown is Mumbai
      - my email is foo@bar.com
    parameters:
      key: "string — fact key (name, location, role, ...)"
      value: "string — the value"

  - name: recall_personal_fact
    category: memory
    summary: Recall a specific personal fact (what's my name, where do I live, etc.).
    example_phrases:
      - who am I
      - what's my name
      - where do I live
      - what's my role
      - what's my email
      - what's my hometown

  - name: forget_memory
    category: memory
    summary: Forget a single specific fact by key (forget my love for X, forget my name, ...).
    example_phrases:
      - forget my love for coding
      - forget my name
      - forget where I live
      - forget that I love jazz
      - forget my hometown
      - forget my email
      - forget that I'm a student
    parameters:
      key: "string — fact key to forget"

  - name: wipe_memory_init
    category: memory
    summary: Start the two-step memory wipe flow (asks for confirmation).
    example_phrases:
      - forget everything you know about me
      - wipe your memory
      - wipe my memory
      - erase everything you know about me
      - reset your memory
      - delete everything you know about me

  - name: export_memory
    category: memory
    summary: Export all stored memory facts to a JSON file.
    example_phrases:
      - export my memory
      - export my memories
      - backup my memory
      - save my memories to a file

  - name: forget_learned_intents
    category: memory
    summary: Reset learned phrasings and usage habits (keeps facts/preferences).
    example_phrases:
      - forget how I talk
      - forget how I speak
      - reset what you learned about how I talk
      - unlearn my phrasings
      - stop learning how I talk
      - forget how I word things
      - reset your intent learning

  - name: search_conversations
    category: memory
    summary: FTS5 keyword search over past conversation turns.
    example_phrases:
      - search my conversations for programming
      - find in my chat history about deadlines
      - what did we talk about last week
      - what have we discussed about the deploy
      - search past turns for python
      - look back through our old chats
      - go back through our previous conversations
    parameters:
      query: "string — search terms"

  - name: save_note
    category: notes
    summary: Save a free-form note.
    example_phrases:
      - save a note about the meeting
      - note that the build is broken
      - remember this for later
      - jot down my idea
      - make a note: buy milk
      - jot this down so you remember it
      - write this down for me

  - name: read_notes
    category: notes
    summary: Read back the saved notes.
    example_phrases:
      - read my notes
      - what notes do I have
      - show me my notes

