workflow_name: set_reminder
description: >
  Slot-fill a personal time-based reminder. The caller (TaskManagerPlugin's
  handle_set_reminder) supplies the reminder message and seeds whichever of the
  date/time it could already parse from the first turn; this template asks for
  the missing half (date, then time) and schedules via the create_reminder
  capability, which wraps the unchanged calendar scheduling core.

  Two separate date/time ask-steps deliberately preserve the pre-cutover
  two-phase follow-up behaviour (ask date, then ask time; bare-hour answers like
  "four" read as 4 o'clock; ambiguous past-morning hours bump to the afternoon).
  Launch-hardening §5.4 Step 3 made this template the LIVE reminder slot-fill
  path — the ReminderWorkflow shim has been retired.
version: "0.2.0"
domain: task
tags: [reminder, slot-fill]

required_inputs: [message]

steps:
  - step_id: ask_date
    ask: "What date should I remind you?"
    slot: date
    extract_with: extract_reminder_date

  - step_id: ask_time
    ask: "What time should I remind you?"
    slot: time
    extract_with: extract_reminder_time

  - step_id: schedule
    capability: create_reminder
    args:
      message: "{{message}}"
      date: "{{date}}"
      time: "{{time}}"
    side_effect_level: write
