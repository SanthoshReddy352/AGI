workflow_name: user_onboarding
description: >
  First-run user-profile onboarding. Five linear questions, then writes
  every collected answer to the user_profile facts namespace and marks
  the onboarding completion flag.
version: 1.0.0
domain: general
tags: [first_run, profile]
steps:
  # ---- Q1: name (special extractor handles "My name is X" / "I'm X" / skip)
  - step_id: ask_name
    ask: "Hello! Before we start — what should I call you?"
    slot: user_name
    extract_with: extract_user_name_or_skip

  # ---- Q2: role (greeting uses the answer from Q1)
  - step_id: ask_role
    ask: "Nice to meet you, {{user_name|default:there}}. What do you do?"
    slot: user_role
    extract_with: extract_answer_or_skip

  # ---- Q3: location
  - step_id: ask_location
    ask: "Where are you based? Helps me with weather, time zone, and news."
    slot: user_location
    extract_with: extract_answer_or_skip

  # ---- Q4: preferences
  - step_id: ask_preferences
    ask: "Any tools or topics you care about most? Short answer is fine."
    slot: user_preferences
    extract_with: extract_answer_or_skip

  # ---- Q5: comm_style
  - step_id: ask_comm_style
    ask: "How do you like me to talk to you — concise, detailed, or somewhere in between?"
    slot: user_comm_style
    extract_with: extract_answer_or_skip

  # ---- After all slots filled: write every field + mark complete + final greeting.
  - step_id: complete
    capability: complete_onboarding
    args:
      name: "{{user_name}}"
      role: "{{user_role}}"
      location: "{{user_location}}"
      preferences: "{{user_preferences}}"
      comm_style: "{{user_comm_style}}"
    side_effect_level: write
