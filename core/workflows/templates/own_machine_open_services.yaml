workflow_name: own_machine_open_services
description: >
  Scan the local machine (loopback) for open TCP services. Read-only,
  no authorization needed beyond the local scope.
version: 1.0.0
domain: cybersecurity_lab
tags: [local, self_audit, read_only]
required_inputs:
  - target_host
optional_inputs:
  - scan_profile
preconditions:
  - target_scope.network_scope in ['local', 'lab']
permission_checks:
  - local_access
steps:
  - step_id: s1
    capability: host_service_scan
    args:
      target: "{{target_host|default:127.0.0.1}}"
      profile: "{{scan_profile|default:quick}}"
    side_effect_level: read
stop_conditions:
  - user_cancelled
final_report:
  format: markdown
  sections: [host, reachable, open_ports, services]
