# Placeholder template — wires up in Phase 5 (dig wrapper + report capability).
workflow_name: dns_enum_owned_domain
description: >
  Read-only DNS record enumeration for a domain the user owns or is
  authorized to test. Produces a markdown record inventory.
version: 0.1.0
domain: cybersecurity_lab
tags: [dns, lab, authorized, read_only, planned]
required_inputs:
  - domain
optional_inputs:
  - record_types
preconditions:
  - authorization.confirmed == true
  - target_scope.ownership_claim in ['user_owned', 'lab', 'ctf']
permission_checks:
  - authorized_scope
steps:
  - step_id: s1
    capability: dns_enum_owned_domain
    args:
      domain: "{{domain}}"
      record_types: "{{record_types|default:A,AAAA,MX,NS,TXT}}"
    side_effect_level: read
  - step_id: s2
    capability: security_report_generate
    depends_on: [s1]
    args:
      style: dns_summary
    side_effect_level: write
    requires_confirmation: true
stop_conditions:
  - user_cancelled
final_report:
  format: markdown
  sections: [domain, records, notes]
