# Placeholder template — references capabilities (web_recon_lab,
# directory_inventory_safe, security_report_generate) that will be wired in
# Phase 5. Loading this template succeeds; compiling it WITH a registry that
# does not yet contain those capabilities raises CompileError, which is the
# correct behavior (template is a contract about future capability shape).
workflow_name: web_app_recon_lab
description: >
  Web app reconnaissance against an authorized lab URL. Performs safe
  enumeration and generates a markdown report.
version: 0.1.0
domain: cybersecurity_lab
tags: [web, lab, authorized, read_only, planned]
required_inputs:
  - base_url
optional_inputs:
  - depth
preconditions:
  - target_scope.network_scope in ['lab', 'ctf']
  - authorization.confirmed == true
permission_checks:
  - authorized_scope
steps:
  - step_id: s1
    capability: web_recon_lab
    args:
      base_url: "{{base_url}}"
      mode: safe_enum
    side_effect_level: read
  - step_id: s2
    capability: directory_inventory_safe
    depends_on: [s1]
    args:
      base_url: "{{base_url}}"
      wordlist: common_paths
    side_effect_level: read
  - step_id: s3
    capability: security_report_generate
    depends_on: [s1, s2]
    args:
      sections: [scope, paths, headers, notes]
      style: web_recon_summary
    side_effect_level: write
    requires_confirmation: true
stop_conditions:
  - user_cancelled
  - policy_violation
final_report:
  format: markdown
  sections: [scope, paths, headers, notes]
