# Placeholder — references parse_scan_artifacts / security_report_generate
# capabilities that Phase 5 will register alongside the deterministic
# report-generator wrapper.
workflow_name: report_from_scan_artifacts
description: >
  Convert previously-stored scan artifacts (nmap XML, gobuster JSON, dig
  output) into a polished markdown security report.
version: 0.1.0
domain: cybersecurity_lab
tags: [report, deterministic, planned]
required_inputs:
  - artifact_refs
optional_inputs:
  - report_style
preconditions:
  - artifacts_exist == true
permission_checks: []
steps:
  - step_id: s1
    capability: parse_scan_artifacts
    args:
      refs: "{{artifact_refs}}"
      mode: normalize
    side_effect_level: read
  - step_id: s2
    capability: security_report_generate
    depends_on: [s1]
    args:
      style: "{{report_style|default:executive_plus_technical}}"
    side_effect_level: write
    requires_confirmation: true
stop_conditions: []
final_report:
  format: markdown
  sections: [summary, scope, findings, differences, caveats]
